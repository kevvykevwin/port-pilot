<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22" width="22" height="22" aria-hidden="true">
  <g fill="#000" shape-rendering="crispEdges">
    <!-- roof (triangle) -->
    <polygon points="11,1.5 8,4.2 14,4.2"/>
    <!-- lantern room -->
    <rect x="8.9" y="4.2" width="4.2" height="2.6"/>
    <!-- catwalk -->
    <rect x="8.0" y="6.8" width="6.0" height="1.2"/>
    <!-- light beam (asymmetric, rightward) -->
    <polygon points="14.0,5.4 20.5,4.4 20.5,6.8"/>
    <!-- tower legs (tapered) -->
    <polygon points="8.7,8.0 9.9,8.0 9.2,17.0 8.0,17.0"/>
    <polygon points="12.1,8.0 13.3,8.0 14.0,17.0 12.8,17.0"/>
    <!-- door -->
    <rect x="10.4" y="14.8" width="1.2" height="2.2"/>
    <!-- base -->
    <rect x="7.0" y="17.0" width="8.0" height="1.6"/>
  </g>
</svg>
